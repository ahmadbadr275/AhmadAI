<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ahmad AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="startChat()">

  <!-- Logo at top -->
  <img src="logo.png" alt="Ahmad AI Logo" class="chatLogo">

  <!-- Chat box -->
  <div id="chatBox"></div>

  <!-- User input section -->
  <div id="userControls" style="margin-top:10px;">
    <input type="text" id="userInput" onkeydown="enterSend(event)" placeholder="Type your message...">
    <button onclick="sendMessage()">Send</button>
    <button onclick="clearChat()">Clear</button>
    <input type="color" id="colorInput" onchange="changeBackground()" title="Change background color">
  </div>

  <!-- Chess area (appears when user types 'play chess') -->
  <div id="chessArea"></div>

  <!-- Script -->
  <script src="script.js"></script>
</body>
</html>
