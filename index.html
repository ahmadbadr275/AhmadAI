<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ahmad AI Chat</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">

  <!-- JS Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
</head>
<body onload="startChat()">

  <!-- Header -->
  <header>
    <img src="logo.png" alt="Ahmad AI Logo" class="logo">
    <h1>Ahmad AI</h1>
  </header>

  <!-- Chat Container -->
  <div class="chat-container">
    <div id="chatBox" class="chat-box"></div>
    <input type="text" id="userInput" placeholder="Type a message..." onkeydown="enterSend(event)">
    <div class="buttons">
      <button onclick="sendMessage()">Send</button>
      <button onclick="clearChat()">Clear</button>
      <input type="color" id="colorInput" onchange="changeBackground()" title="Pick background color">
    </div>
  </div>

  <!-- Chess Board -->
  <div id="chessBoard" style="width:100%; max-width:500px; margin:20px auto;"></div>

  <!-- JS -->
  <script src="script.js"></script>
</body>
</html>
